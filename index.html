<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Advanced Fashion Configurator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0d0d0d;
    --panel:#171717;
    --panel-light:#262626;
    --panel-hover:#3a3a3a;
    --line:#2b2b2b;
    --text:#ffffff;
    --muted:#777;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    overflow:hidden;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:340px;
    background:var(--panel);
    padding:24px;
    overflow-y:auto;
    border-right:1px solid var(--line);
    flex-shrink:0;
}

.sidebar h1{
    font-size:28px;
    margin-bottom:24px;
    letter-spacing:2px;
}

.section{
    margin-bottom:34px;
}

.section h2{
    margin-bottom:14px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:3px;
    color:var(--muted);
}

.button-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    border:none;
    background:var(--panel-light);
    color:white;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    transition:0.25s;
    font-size:14px;
}

button:hover{
    background:var(--panel-hover);
    transform:translateY(-2px);
}

.color-btn{
    height:50px;
}

.random-btn{
    width:100%;
    background:white;
    color:black;
    font-weight:bold;
}

.random-btn:hover{
    background:#d9d9d9;
}

/* =========================
   STAGE
========================= */

.stage{
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.glow{
    position:absolute;
    width:900px;
    height:900px;
    background:
        radial-gradient(circle,
        rgba(255,255,255,0.08),
        transparent 70%);
    filter:blur(60px);
}

/* =========================
   MODEL
========================= */

.model{
    position:relative;
    width:320px;
    height:760px;
}

.hidden{
    display:none !important;
}

/* =========================
   HUMAN BASE
========================= */

.head{
    width:92px;
    height:92px;
    background:#dfc4ab;
    border-radius:50%;
    position:absolute;
    left:50%;
    top:10px;
    transform:translateX(-50%);
    z-index:20;
}

.neck{
    width:30px;
    height:28px;
    background:#dfc4ab;
    position:absolute;
    left:50%;
    top:88px;
    transform:translateX(-50%);
    border-radius:10px;
    z-index:8;
}

.torso{
    width:125px;
    height:210px;
    background:#dfc4ab;
    position:absolute;
    left:50%;
    top:108px;
    transform:translateX(-50%);
    border-radius:55px 55px 35px 35px;
    z-index:1;
}

.hips{
    width:145px;
    height:80px;
    background:#dfc4ab;
    position:absolute;
    left:50%;
    top:270px;
    transform:translateX(-50%);
    border-radius:50px;
    z-index:1;
}

.arm{
    width:36px;
    height:210px;
    background:#dfc4ab;
    position:absolute;
    top:135px;
    border-radius:30px;
    z-index:2;
}

.arm.left{
    left:48px;
    transform:rotate(7deg);
}

.arm.right{
    right:48px;
    transform:rotate(-7deg);
}

.leg{
    width:48px;
    height:270px;
    background:#dfc4ab;
    position:absolute;
    bottom:35px;
    border-radius:40px;
    z-index:1;
}

.leg.left{
    left:104px;
    top: 325px;
}

.leg.right{
    right:104px;
    top: 325px;
}

.shoe{
    width:64px;
    height:28px;
    background:#111;
    position:absolute;
    bottom:10px;
    border-radius:30px;
    z-index:1;
}

.shoe.left{
    left:95px;
}

.shoe.right{
    right:95px;
}

/* =========================
   HAIR
========================= */

.hair{
    position:absolute;
    left:50%;
    top:0;
    transform:translateX(-50%);
    z-index:21;
}

.hair.short{
    width:100px;
    height:55px;
    background:#1d1d1d;
    border-radius:50px 50px 20px 20px;
}

.hair.long{
    width:120px;
    height:150px;
    background:#2d1b0f;
    border-radius:60px;
}

.hair.cyber{
    width:110px;
    height:70px;
    background:linear-gradient(90deg,#00d0ff,#ff00cc);
    clip-path:polygon(0 0,100% 0,90% 100%,10% 100%);
}

/* =========================
   TOPS
========================= */

.top{
    width:150px;
    height:145px;
    background:#ff3366;
    position:absolute;
    left:50%;
    top:115px;
    transform:translateX(-50%);
    border-radius:30px;
    z-index:10;
    transition:0.3s;
}

.top.oversized{
    width:190px;
    height:175px;
}

.top.blazer{
    border-radius:14px;
    width:165px;
    height:165px;
}

.top.crop{
    height:90px;
}

.top.futuristic{
    clip-path:polygon(10% 0%,90% 0%,100% 30%,85% 100%,15% 100%,0% 30%);
}

/* =========================
   BOTTOMS
========================= */

.bottom{
    background:#6666ff;
    position:absolute;
    left:50%;
    top:245px;
    transform:translateX(-50%);
    z-index:9;
    transition:0.3s;
}

.bottom.skirt{
    width:170px;
    height:135px;
    clip-path:polygon(10% 0%,90% 0%,100% 100%,0% 100%);
}

.bottom.shorts{
    width:145px;
    height:85px;
    border-radius:18px;
}

.bottom.pants{
    width:135px;
    height:280px;
    border-radius:24px;
}

.bottom.wide{
    width:185px;
    height:310px;
    border-radius:36px;
}

.bottom.dress{
    width:190px;
    height:420px;
    border-radius:40px;
    top:180px;
    clip-path:polygon(20% 0%,80% 0%,100% 100%,0% 100%);
}

/* =========================
   ACCESSORIES
========================= */

.bag{
    width:72px;
    height:72px;
    background:#ffcc00;
    position:absolute;
    right:18px;
    top:290px;
    border-radius:16px;
    z-index:12;
}

.bag::before{
    content:"";
    position:absolute;
    width:42px;
    height:20px;
    border:5px solid #ffcc00;
    border-bottom:none;
    border-radius:20px 20px 0 0;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
}

.glasses{
    width:82px;
    height:22px;
    position:absolute;
    left:50%;
    top:36px;
    transform:translateX(-50%);
    z-index:30;
}

.glasses::before,
.glasses::after{
    content:"";
    width:30px;
    height:22px;
    background:black;
    position:absolute;
    border-radius:10px;
}

.glasses::after{
    right:0;
}

.necklace{
    width:75px;
    height:42px;
    border:4px solid silver;
    border-top:none;
    border-radius:0 0 50px 50px;
    position:absolute;
    left:50%;
    top:118px;
    transform:translateX(-50%);
    z-index:15;
}

.hat{
    width:130px;
    height:34px;
    background:#111;
    position:absolute;
    left:50%;
    top:-8px;
    transform:translateX(-50%);
    border-radius:50px;
    z-index:25;
}

.hat::before{
    content:"";
    width:74px;
    height:55px;
    background:#111;
    position:absolute;
    left:50%;
    top:-38px;
    transform:translateX(-50%);
    border-radius:20px 20px 0 0;
}

/* =========================
   TITLE
========================= */

.title{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    letter-spacing:8px;
    color:#666;
    font-size:12px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        flex-direction:column;
        overflow:auto;
    }

    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid var(--line);
    }

    .stage{
        min-height:900px;
    }
}

</style>
</head>

<body>

<div class="sidebar">

    <h1>FASHION LAB</h1>

    <div class="section">
        <button class="random-btn" id="randomizeBtn">
            RANDOM LOOK
        </button>
    </div>

    <!-- TOPS -->

    <div class="section">
        <h2>Tops</h2>

        <div class="button-grid">
            <button data-top="normal">Basic</button>
            <button data-top="oversized">Oversized</button>
            <button data-top="crop">Crop</button>
            <button data-top="blazer">Blazer</button>
            <button data-top="futuristic">Cyber</button>
        </div>
    </div>

    <!-- BOTTOMS -->

    <div class="section">
        <h2>Bottoms</h2>

        <div class="button-grid">
            <button data-bottom="skirt">Skirt</button>
            <button data-bottom="shorts">Shorts</button>
            <button data-bottom="pants">Pants</button>
            <button data-bottom="wide">Wide Pants</button>
            <button data-bottom="dress">Long Dress</button>
        </div>
    </div>

    <!-- HAIR -->

    <div class="section">
        <h2>Hair</h2>

        <div class="button-grid">
            <button data-hair="short">Short</button>
            <button data-hair="long">Long</button>
            <button data-hair="cyber">Cyber</button>
        </div>
    </div>

    <!-- ACCESSORIES -->

    <div class="section">
        <h2>Accessories</h2>

        <div class="button-grid">
            <button data-accessory="bag">Handbag</button>
            <button data-accessory="glasses">Sunglasses</button>
            <button data-accessory="necklace">Necklace</button>
            <button data-accessory="hat">Hat</button>
        </div>
    </div>

    <!-- TOP COLOR -->

    <div class="section">
        <h2>Top Color</h2>

        <div class="button-grid">
            <button class="color-btn" data-top-color="#ff3366" style="background:#ff3366"></button>
            <button class="color-btn" data-top-color="#00d0ff" style="background:#00d0ff"></button>
            <button class="color-btn" data-top-color="#00ff99" style="background:#00ff99"></button>
            <button class="color-btn" data-top-color="#ffffff" style="background:#ffffff"></button>
        </div>
    </div>

    <!-- BOTTOM COLOR -->

    <div class="section">
        <h2>Bottom Color</h2>

        <div class="button-grid">
            <button class="color-btn" data-bottom-color="#6666ff" style="background:#6666ff"></button>
            <button class="color-btn" data-bottom-color="#ff9900" style="background:#ff9900"></button>
            <button class="color-btn" data-bottom-color="#ff00cc" style="background:#ff00cc"></button>
            <button class="color-btn" data-bottom-color="#ffffff" style="background:#ffffff"></button>
        </div>
    </div>

</div>

<div class="stage">

    <div class="glow"></div>

    <div class="model">

        <div class="hair short" id="hair"></div>

        <div class="hat hidden" id="hat"></div>

        <div class="head">
            <div class="glasses hidden" id="glasses"></div>
        </div>

        <div class="neck"></div>

        <div class="torso"></div>
        <div class="hips"></div>

        <div class="arm left"></div>
        <div class="arm right"></div>

        <div class="necklace hidden" id="necklace"></div>

        <div class="top" id="top"></div>

        <div class="bottom skirt" id="bottom"></div>

        <div class="bag hidden" id="bag"></div>

        <div class="leg left"></div>
        <div class="leg right"></div>

        <div class="shoe left"></div>
        <div class="shoe right"></div>

    </div>

    <div class="title">
        DIGITAL RUNWAY SYSTEM
    </div>

</div>

<script>

        const state = {
        top: 'normal',
        bottom: 'skirt',
        topColor: '#ff3366',
        bottomColor: '#6666ff',
        hair: 'short',

        accessories: {
            bag: false,
            glasses: false,
            necklace: false,
            hat: false
        }
    };

    /* =========================
       ELEMENTS
    ========================= */

    const topEl = document.getElementById('top');
    const bottomEl = document.getElementById('bottom');
    const hairEl = document.getElementById('hair');

    const accessoryElements = {
        bag: document.getElementById('bag'),
        glasses: document.getElementById('glasses'),
        necklace: document.getElementById('necklace'),
        hat: document.getElementById('hat')
    };

    const legElements = document.querySelectorAll('.leg');
    const shoeElements = document.querySelectorAll('.shoe');

    /* =========================
       CLASS LISTS
    ========================= */

    const topClasses = [
        'oversized',
        'crop',
        'blazer',
        'futuristic'
    ];

    const bottomClasses = [
        'skirt',
        'shorts',
        'pants',
        'wide',
        'dress'
    ];

    const hairClasses = [
        'short',
        'long',
        'cyber'
    ];

    /* =========================
       RENDER
    ========================= */

    function render() {

        /* TOP */

        topEl.className = 'top';

        if (state.top !== 'normal') {
            topEl.classList.add(state.top);
        }

        topEl.style.background = state.topColor;

        /* BOTTOM */

        bottomEl.className = 'bottom';
        bottomEl.classList.add(state.bottom);

        bottomEl.style.background = state.bottomColor;

        /* HAIR */

        hairEl.className = 'hair';
        hairEl.classList.add(state.hair);

        /* ACCESSORIES */

        Object.entries(state.accessories).forEach(([key, active]) => {

            accessoryElements[key].classList.toggle(
                'hidden',
                !active
            );
        });

        /* DRESS MODE */

        const hideLegs = state.bottom === 'dress';

        legElements.forEach(el => {
            el.classList.toggle('hidden', hideLegs);
        });

        shoeElements.forEach(el => {
            el.classList.toggle('hidden', hideLegs);
        });
    }

    /* =========================
       TOPS
    ========================= */

    document
        .querySelectorAll('[data-top]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                state.top = btn.dataset.top;

                render();
            });
        });

    /* =========================
       BOTTOMS
    ========================= */

    document
        .querySelectorAll('[data-bottom]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                state.bottom = btn.dataset.bottom;

                render();
            });
        });

    /* =========================
       HAIR
    ========================= */

    document
        .querySelectorAll('[data-hair]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                state.hair = btn.dataset.hair;

                render();
            });
        });

    /* =========================
       ACCESSORIES
    ========================= */

    document
        .querySelectorAll('[data-accessory]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                const key = btn.dataset.accessory;

                state.accessories[key] =
                    !state.accessories[key];

                render();
            });
        });

    /* =========================
       TOP COLORS
    ========================= */

    document
        .querySelectorAll('[data-top-color]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                state.topColor =
                    btn.dataset.topColor;

                render();
            });
        });

    /* =========================
       BOTTOM COLORS
    ========================= */

    document
        .querySelectorAll('[data-bottom-color]')
        .forEach(btn => {

            btn.addEventListener('click', () => {

                state.bottomColor =
                    btn.dataset.bottomColor;

                render();
            });
        });

    /* =========================
       RANDOMIZER
    ========================= */

    const topOptions = [
        'normal',
        'oversized',
        'crop',
        'blazer',
        'futuristic'
    ];

    const bottomOptions = [
        'skirt',
        'shorts',
        'pants',
        'wide',
        'dress'
    ];

    const hairOptions = [
        'short',
        'long',
        'cyber'
    ];

    const colors = [
        '#ff3366',
        '#00d0ff',
        '#00ff99',
        '#ffffff',
        '#ff9900',
        '#ff00cc'
    ];

    function randomItem(arr) {

        return arr[
            Math.floor(Math.random() * arr.length)
        ];
    }

    function randomBool() {

        return Math.random() > 0.5;
    }

    function randomizeLook() {

        state.top =
            randomItem(topOptions);

        state.bottom =
            randomItem(bottomOptions);

        state.hair =
            randomItem(hairOptions);

        state.topColor =
            randomItem(colors);

        state.bottomColor =
            randomItem(colors);

        Object.keys(state.accessories)
            .forEach(key => {

                state.accessories[key] =
                    randomBool();
            });

        render();
    }

    /* =========================
       RANDOM BUTTON
    ========================= */

    const randomizeBtn =
        document.getElementById('randomizeBtn');

    if (randomizeBtn) {

        randomizeBtn.addEventListener(
            'click',
            randomizeLook
        );
    }

    /* =========================
       PRESETS
    ========================= */

    const presets = {

        cyberpunk: {
            top: 'futuristic',
            bottom: 'wide',
            hair: 'cyber',
            topColor: '#00d0ff',
            bottomColor: '#111111'
        },

        minimal: {
            top: 'blazer',
            bottom: 'pants',
            hair: 'short',
            topColor: '#ffffff',
            bottomColor: '#222222'
        },

        runway: {
            top: 'oversized',
            bottom: 'dress',
            hair: 'long',
            topColor: '#ff00cc',
            bottomColor: '#ff9900'
        }
    };

    function applyPreset(name) {

        const preset = presets[name];

        if (!preset) return;

        state.top = preset.top;
        state.bottom = preset.bottom;
        state.hair = preset.hair;

        state.topColor = preset.topColor;
        state.bottomColor = preset.bottomColor;

        render();
    }

    /* =========================
       KEYBOARD SHORTCUTS
    ========================= */

    window.addEventListener('keydown', (e) => {

        if (e.key === 'r') {
            randomizeLook();
        }

        if (e.key === '1') {
            applyPreset('cyberpunk');
        }

        if (e.key === '2') {
            applyPreset('minimal');
        }

        if (e.key === '3') {
            applyPreset('runway');
        }
    });

    /* =========================
       INIT
    ========================= */

    render();

</script>

</body>
</html>
